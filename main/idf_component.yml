dependencies:
  idf:
    version: '>=6.0'
  lvgl/lvgl: "^9.2"

  ## Wi-Fi / Bluetooth on the ESP32-P4 are routed through the
  ## on-board ESP32-C6 co-processor via the ESP-Hosted-MCU
  ## protocol over SDIO (see docs/tab5-esp-hosted.md). The host
  ## side is provided by `espressif/esp_hosted`; `esp_wifi_remote`
  ## redirects standard `esp_wifi_*` calls into hosted RPCs so the
  ## existing wifi_manager component does not need a P4-specific
  ## path. Both are gated on `target == esp32p4` so ESP32-S3 builds
  ## are unaffected; the `idf_version <6.1` rule mirrors the
  ## upstream esp-hosted-mcu examples.
  espressif/esp_wifi_remote:
    version: ">=1.3.1"
    rules:
      - if: "target == esp32p4"
      - if: "idf_version <6.1"
  espressif/esp_hosted:
    version: ">=2.12"
    rules:
      - if: "target == esp32p4"
