## IDF Component manifest for the git_sync component.
##
## git_sync parses GitHub REST API responses with cJSON. ESP-IDF 6.0
## removed the bundled in-tree "json" core component and moved cJSON
## to the espressif/cjson managed component (see the ESP-IDF 6.0
## protocols migration guide).
##
## See:
##   https://components.espressif.com/components/espressif/cjson
##   https://github.com/espressif/idf-extra-components/tree/master/cjson
dependencies:
  espressif/cjson:
    version: "^1.7.18"
