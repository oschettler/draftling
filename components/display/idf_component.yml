## IDF Component manifest for the display component.
##
## The lvgl_port and the RLCD driver depend only on stock ESP-IDF and
## on the lvgl/lvgl component declared by the application. The
## epdiy-based backends (LilyGO T5 E-Paper S3 Pro / Pro Lite via
## the built-in epd_board_v7, M5Stack PaperS3 via the in-tree
## epd_board_papers3.c) depend on the vroland/epdiy managed
## component, gated on `target != esp32p4` because epdiy ships
## Xtensa-only LX6/LX7 board headers.
##
## See:
##   https://components.espressif.com/components/vroland/epdiy
##   https://github.com/vroland/epdiy
dependencies:
  ## Pinned to a post-2.0.0 git commit (no tagged release yet) that
  ## carries vroland/epdiy PR #475 ("Migrate epdiy board I2C init to
  ## the new ESP-IDF driver"). That PR migrates epdiy's on-board I2C
  ## bus from the legacy `driver/i2c.h` to driver-NG
  ## (`driver/i2c_master.h`) AND adds a new `epd_init_with_config()`
  ## entry point that accepts a caller-supplied
  ## `i2c_master_bus_handle_t` via `EpdInitConfig.i2c.bus_handle`.
  ## Both pieces are required to share the LilyGO T5 E-Paper S3 Pro
  ## (and Pro Lite) on-board I2C bus between epdiy (PCA9535 + TPS65185)
  ## and the GT911 capacitive touch controller managed by the
  ## Draftling touchscreen component (also driver-NG). Drop the pin
  ## and switch back to a version range once a 2.0.1 / 2.1 tag
  ## including PR #475 lands on the Espressif Component Registry.
  ## epdiy only supports Xtensa targets (LX6/LX7); its board headers
  ## include xtensa/core-macros.h which does not exist in the RISC-V
  ## toolchain used for ESP32-P4. Exclude the dependency on ESP32-P4
  ## (M5Stack Tab5) so that build does not pull it in and fail to
  ## compile epd_board.h. display_epdiy.cpp is wrapped in
  ## `#if CONFIG_DRAFTLING_DISPLAY_EPDIY` so skipping the dep on
  ## non-epdiy targets is sufficient.
  vroland/epdiy:
    git: "https://github.com/vroland/epdiy.git"
    version: "a3426c0ec38f98282cf3ec33761e556f083b0f7c"
    rules:
      - if: "target != esp32p4"
    require: public
  ## espressif/m5stack_tab5 BSP, pulled in only for the ESP32-P4
  ## M5Stack Tab5 build. Handles MIPI-DSI PHY LDO power-up,
  ## ILI9881C / ST7123 panel init (auto-detected by I2C probe),
  ## PI4IOE5V6408 I/O expander for the LCD / touch / USB power
  ## rails, LEDC PWM backlight on GPIO22, and the GT911 / ST7123
  ## touch controller. Draftling's display_mipi_dsi.cpp backend
  ## uses the BSP's lower-level bsp_display_new_with_handles()
  ## API to obtain an esp_lcd_panel_handle_t and bsp_i2c_init()
  ## to obtain a shared driver-NG I2C bus handle (handed to the
  ## touchscreen component the same way as on the LilyGO T5).
  ## See https://components.espressif.com/components/espressif/m5stack_tab5
  espressif/m5stack_tab5:
    version: "^1.2.0~1"
    rules:
      - if: "target == esp32p4"
    require: public
