## IDF Component manifest for the display component.
##
## The lvgl_port and the RLCD/UC8179 drivers depend only on stock
## ESP-IDF and on the lvgl/lvgl component declared by the application.
## The PaperS3 driver shim (display_eds3.cpp) additionally depends on
## the m5stack/M5GFX managed component, which is pulled in only when
## the M5Stack PaperS3 hardware model is selected so that builds for
## the other boards remain free of that dependency.
##
## See:
##   https://components.espressif.com/components/m5stack/m5gfx
##   https://github.com/m5stack/M5GFX
dependencies:
  m5stack/m5gfx:
    version: "^0.2.6"
    rules:
      - if: "idf_version >=5.3.0"
    require: public
