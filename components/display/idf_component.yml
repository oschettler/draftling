## IDF Component manifest for the display component.
##
## The lvgl_port and the RLCD driver depend only on stock ESP-IDF and
## on the lvgl/lvgl component declared by the application. The
## PaperS3 driver shim (display_eds3.cpp) additionally depends on the
## m5stack/M5GFX managed component, which is pulled in only when the
## M5Stack PaperS3 hardware model is selected so that builds for the
## other boards remain free of that dependency. The LilyGO T5
## E-Paper S3 Pro (and Pro Lite) backend (display_epdiy.cpp)
## depends on the vroland/epdiy managed component, gated the same
## way on the corresponding hardware-model symbols.
##
## See:
##   https://components.espressif.com/components/m5stack/m5gfx
##   https://github.com/m5stack/M5GFX
##   https://components.espressif.com/components/vroland/epdiy
##   https://github.com/vroland/epdiy
dependencies:
  m5stack/m5gfx:
    version: "^0.2.6"
    rules:
      - if: "idf_version >=5.3.0"
    require: public
  vroland/epdiy:
    version: ">=2.0.0"
    rules:
      - if: "idf_version >=5.3.0"
    require: public
